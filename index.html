<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>IRAS — Intelligent Recruitment Automation System</title>
    <meta name="description" content="AI-powered recruitment automation: job descriptions, application shortlisting, candidate ranking, and skill gap analysis." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Applied before paint to avoid a light-mode flash when the stored
      // preference (or OS setting) is dark.
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("iras-theme") || "{}").state?.theme || "system";
          var isDark =
            stored === "dark" ||
            (stored === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
