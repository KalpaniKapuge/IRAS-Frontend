<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>IRAS - Intelligent Recruitment Automation System</title>
    <meta name="description" content="AI-powered recruitment automation: job descriptions, application shortlisting, candidate ranking, and skill gap analysis." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <script>
      // Applied before paint to avoid a light-mode flash when the stored preference is dark.
      (function () {
        try {
          var stored = JSON.parse(localStorage.getItem("iras-theme") || "{}").state?.theme || "light";
          document.documentElement.classList.toggle("dark", stored === "dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
